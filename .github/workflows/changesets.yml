name: Changesets

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Snapshot release: publish <version>-<tag>-<datetime> under this npm dist-tag (e.g. next). Leave empty for the normal release flow."
        type: string
        default: ""

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    if: github.event_name == 'push' || inputs.snapshot == ''
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create versions and publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm ci:publish
          version: pnpm ci:version
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # Keep the "version packages" PR out of the generated release notes (excluded via .github/release.yml).
      - name: Label the release PR
        if: steps.changesets.outputs.pullRequestNumber
        run: gh pr edit ${{ steps.changesets.outputs.pullRequestNumber }} --add-label skip-changelog
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      # Cut the GitHub Release ONLY when this push actually published a new version to npm.
      # ci:publish is `pnpm publish` (for OIDC provenance), whose output the changesets action
      # can't parse — so `outputs.published` is unreliable and we can't gate on it. The naive
      # `node -p "require('./bin/package.json').version"` is ALSO wrong: the `version` step above
      # runs `changeset version`, which bumps the WORKSPACE package.json to the *staged next*
      # version even on a version-PR push that publishes nothing — that read once cut a phantom
      # `v0.6.0` Release with no npm artifact. So gate on two facts: (1) the version COMMITTED on
      # the merge commit (immune to the workspace bump), and (2) that exact `cotal-ai` version being
      # live on npm (a short retry covers post-publish registry propagation). The step stays
      # idempotent — it no-ops once the Release exists. Uses GH_PAT (not the default GITHUB_TOKEN)
      # so the published Release still triggers the Discord webhook.
      - name: Tag and cut the GitHub Release on publish
        if: success() && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Read the COMMITTED version, not the workspace (which `changeset version` may have bumped).
          version=$(git show "$GITHUB_SHA:bin/package.json" | jq -r .version)
          tag="v$version"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to do."
            exit 0
          fi
          # Only cut a Release for a version that actually published to npm — guards a staged-but-
          # unpublished bump; retry briefly for registry propagation right after publish.
          published=
          for i in 1 2 3 4 5; do
            if npm view "cotal-ai@$version" version >/dev/null 2>&1; then published=1; break; fi
            echo "cotal-ai@$version not yet on npm (attempt $i/5) — waiting…"; sleep 5
          done
          if [ -z "$published" ]; then
            echo "cotal-ai@$version is not on npm — this push published nothing; skipping the Release."
            exit 0
          fi
          notes=$(gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$tag" -f target_commitish="$GITHUB_SHA" --jq .body)
          # The generated notes are merged-PR *titles* only. Prepend the changeset summaries (the actual
          # per-change descriptions changesets wrote into the package CHANGELOGs) so a release reads as
          # more than a list of one-liners. Best-effort: the package is already published, so a hiccup in
          # this cosmetic step must never block cutting the Release (|| true).
          detail=$(node scripts/release-notes-detail.mjs "$version" 2>/dev/null || true)
          {
            printf '🚀 **Cotal %s is out!**\n\nGrab it: `npm i cotal-ai@%s`\n\n' "$version" "$version"
            if [ -n "$detail" ]; then printf '%s\n\n' "$detail"; fi
            printf '%s\n' "$notes"
          } > "$RUNNER_TEMP/release-notes.md"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --latest \
            --notes-file "$RUNNER_TEMP/release-notes.md"
          echo "Created GitHub Release $tag."

  # Snapshot release from any ref — publishes <version>-<tag>-<datetime> under the given npm
  # dist-tag so a branch can be tried out without merging. No commits, no git tags.
  snapshot:
    if: github.event_name == 'workflow_dispatch' && inputs.snapshot != ''
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version snapshot
        run: pnpm changeset version --snapshot ${{ inputs.snapshot }}

      - name: Build and publish
        run: |
          pnpm build
          pnpm publish -r --provenance --access=public --no-git-checks --tag ${{ inputs.snapshot }}
