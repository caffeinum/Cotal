name: Changesets

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Snapshot release: publish <version>-<tag>-<datetime> under this npm dist-tag (e.g. next). Leave empty for the normal release flow."
        type: string
        default: ""

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    if: github.event_name == 'push' || inputs.snapshot == ''
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create versions and publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm ci:publish
          version: pnpm ci:version
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      # ci:publish is `pnpm publish` (for OIDC provenance), which doesn't create git tags — so tag
      # the released versions ourselves whenever a publish actually happened. `changeset tag` creates
      # one tag per package at its current version (e.g. @cotal-ai/connector-core@0.1.3), skipping
      # any that already exist.
      - name: Tag released versions
        if: steps.changesets.outputs.published == 'true'
        run: |
          pnpm changeset tag
          git push origin --tags

  # Snapshot release from any ref — publishes <version>-<tag>-<datetime> under the given npm
  # dist-tag so a branch can be tried out without merging. No commits, no git tags.
  snapshot:
    if: github.event_name == 'workflow_dispatch' && inputs.snapshot != ''
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version snapshot
        run: pnpm changeset version --snapshot ${{ inputs.snapshot }}

      - name: Build and publish
        run: |
          pnpm build
          pnpm publish -r --provenance --access=public --no-git-checks --tag ${{ inputs.snapshot }}
