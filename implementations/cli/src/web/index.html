<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swarl · observability</title>
    <style>
      :root {
        --bg: #0d1117; --panel: #161b22; --line: #21262d; --fg: #c9d1d9;
        --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
        --gray: #6e7681; --red: #f85149; --sel: #1f6feb33; --purple: #bc8cff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; height: 100vh; display: grid; grid-template-rows: auto auto 1fr;
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        background: var(--bg); color: var(--fg);
      }
      header {
        display: flex; align-items: center; gap: 12px; padding: 10px 16px;
        border-bottom: 1px solid var(--line); background: var(--panel);
      }
      header .title { font-weight: 700; letter-spacing: .02em; }
      header .space {
        color: var(--dim); padding: 1px 8px; border: 1px solid var(--line);
        border-radius: 6px; font-size: 12px;
      }
      header .online { color: var(--dim); font-size: 12px; }
      header .conn {
        margin-left: auto; font-size: 12px; padding: 2px 10px;
        border-radius: 10px; border: 1px solid var(--line); color: var(--dim);
      }
      header .conn.live { color: var(--green); border-color: #3fb95055; background: #3fb95014; }
      header .conn.down { color: var(--red); border-color: #f8514955; }
      header .conn::before { content: "● "; }

      /* Golden-signals band — at-a-glance "what's happening now". */
      .signals {
        display: flex; gap: 8px; padding: 8px 16px; background: var(--bg);
        border-bottom: 1px solid var(--line); align-items: center;
      }
      .sig {
        display: flex; align-items: baseline; gap: 6px; padding: 4px 10px;
        border: 1px solid var(--line); border-radius: 6px; background: var(--panel);
      }
      .sig .n { font-weight: 700; font-size: 15px; }
      .sig .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--dim); }
      .sig.working .n { color: var(--green); }
      .sig.idle .n { color: var(--gray); }
      .sig.offline .n { color: var(--red); }
      .sig.waiting .n { color: var(--yellow); }
      /* Waiting is the one signal that demands attention — emphasize when nonzero. */
      .sig.waiting.hot { border-color: var(--yellow); background: #d2992218; }
      .sig.spacer { margin-left: auto; border: 0; background: none; padding: 0; color: var(--dim); font-size: 12px; }

      main { display: grid; grid-template-columns: 260px 1fr 260px; min-height: 0; }
      aside { border-right: 1px solid var(--line); overflow-y: auto; background: var(--panel); }
      aside.rail { border-right: 0; border-left: 1px solid var(--line); }
      .group-title {
        padding: 12px 14px 4px; font-size: 11px; letter-spacing: .08em;
        text-transform: uppercase; color: var(--dim); display: flex; gap: 6px;
      }
      .group-title .c { color: var(--gray); }
      .row {
        display: flex; align-items: baseline; gap: 8px; padding: 5px 14px;
        cursor: default; border-left: 2px solid transparent;
      }
      .chan { cursor: pointer; }
      .chan:hover { background: #ffffff08; }
      .chan.sel { background: var(--sel); border-left-color: var(--accent); }
      .chan .name { color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .row .count { color: var(--gray); font-size: 12px; margin-left: auto; }
      /* Peer rows: two lines so the name is never squeezed by role/activity. */
      .peer { align-items: flex-start; }
      .peer .meta { min-width: 0; flex: 1; display: flex; flex-direction: column; }
      .peer .l1 { display: flex; gap: 6px; align-items: baseline; min-width: 0; }
      .peer .name { color: var(--fg); font-weight: 600; white-space: nowrap; }
      .peer .role { color: var(--dim); font-size: 12px; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; }
      .peer .act { color: var(--dim); font-size: 12px; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; }
      /* Shape + color status glyph — never color alone (accessibility). */
      .dot { font-size: 11px; width: 12px; text-align: center; }
      .dot.working { color: var(--green); } .dot.waiting { color: var(--yellow); }
      .dot.idle { color: var(--gray); } .dot.offline { color: var(--red); }
      .pill { font-size: 10px; padding: 0 6px; border-radius: 9px; margin-left: auto;
        background: var(--accent); color: #06090f; font-weight: 700; }

      section { display: flex; flex-direction: column; min-height: 0; }
      .feed-head {
        display: flex; align-items: center; gap: 8px; padding: 8px 16px;
        border-bottom: 1px solid var(--line);
      }
      .feed-head .h { font-weight: 700; }
      .feed-head .sub { color: var(--dim); font-weight: 400; font-size: 12px; }
      .feed-head .ctrls { margin-left: auto; display: flex; gap: 6px; align-items: center; }
      .feed-head input {
        background: var(--bg); border: 1px solid var(--line); color: var(--fg);
        border-radius: 6px; padding: 3px 8px; font: inherit; font-size: 12px; width: 150px;
      }
      .feed-head button {
        background: var(--bg); border: 1px solid var(--line); color: var(--dim);
        border-radius: 6px; padding: 3px 10px; font: inherit; font-size: 12px; cursor: pointer;
      }
      .feed-head button.on { color: var(--yellow); border-color: var(--yellow); }
      .feed { overflow-y: auto; padding: 8px 16px; flex: 1; }
      .msg { padding: 3px 0; white-space: pre-wrap; word-break: break-word; }
      .msg .ts { color: var(--gray); }
      .msg .who { font-weight: 700; }
      .msg .role { color: var(--dim); }
      .msg .badge { font-size: 10px; padding: 0 5px; border-radius: 3px; margin: 0 4px;
        background: #ffffff14; color: var(--dim); }
      .msg .badge.chat { color: var(--accent); } .msg .badge.unicast { color: var(--yellow); }
      .msg .badge.anycast { color: var(--green); }

      /* Attention rail — "what needs me": agents that are blocked/waiting. */
      .card {
        margin: 8px 12px; padding: 10px 12px; border: 1px solid var(--line);
        border-left: 3px solid var(--yellow); border-radius: 8px; background: var(--bg);
      }
      .card .who { font-weight: 700; }
      .card .who .role { color: var(--dim); font-weight: 400; font-size: 12px; }
      .card .why { color: var(--dim); font-size: 12px; margin-top: 2px; }
      .empty { color: var(--dim); padding: 24px 16px; font-size: 12px; }
      .empty.calm { color: var(--gray); }
    </style>
  </head>
  <body>
    <header>
      <span class="title">Swarl</span>
      <span class="space" id="space"></span>
      <span class="online" id="online"></span>
      <span class="conn down" id="conn">connecting</span>
    </header>
    <div class="signals" id="signals"></div>
    <main>
      <aside>
        <div class="group-title">Online</div>
        <div id="roster"></div>
        <div class="group-title">Channels</div>
        <div id="channels"></div>
      </aside>
      <section>
        <div class="feed-head">
          <span class="h" id="feed-title">All activity</span>
          <span class="sub" id="feed-sub"></span>
          <span class="ctrls">
            <input id="filter" placeholder="filter…" />
            <button id="pause" title="freeze the feed (stop auto-scroll)">pause</button>
          </span>
        </div>
        <div class="feed" id="feed"></div>
      </section>
      <aside class="rail">
        <div class="group-title">Needs attention <span class="c" id="attn-count"></span></div>
        <div id="attention"></div>
      </aside>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
