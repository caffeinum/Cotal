<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swarl · observability</title>
    <style>
      :root {
        --bg: #0d1117; --panel: #161b22; --line: #21262d; --fg: #c9d1d9;
        --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
        --gray: #6e7681; --red: #f85149; --sel: #1f6feb33;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr;
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        background: var(--bg); color: var(--fg);
      }
      header {
        display: flex; align-items: center; gap: 12px; padding: 10px 16px;
        border-bottom: 1px solid var(--line); background: var(--panel);
      }
      header .title { font-weight: 700; }
      header .space { color: var(--dim); }
      header .conn { margin-left: auto; color: var(--dim); }
      header .conn.live::before { content: "● "; color: var(--green); }
      header .conn.down::before { content: "● "; color: var(--red); }
      main { display: grid; grid-template-columns: 260px 1fr; min-height: 0; }
      aside { border-right: 1px solid var(--line); overflow-y: auto; background: var(--panel); }
      .group-title {
        padding: 10px 14px 4px; font-size: 11px; letter-spacing: .08em;
        text-transform: uppercase; color: var(--dim);
      }
      .row {
        display: flex; align-items: baseline; gap: 8px; padding: 5px 14px;
        cursor: default; border-left: 2px solid transparent;
      }
      .chan { cursor: pointer; }
      .chan:hover { background: #ffffff08; }
      .chan.sel { background: var(--sel); border-left-color: var(--accent); }
      .row .name { color: var(--fg); }
      .chan .name { color: var(--accent); }
      .row .role, .row .activity, .row .count { color: var(--dim); font-size: 12px; }
      .row .activity { margin-left: auto; max-width: 120px; overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap; }
      .row .count { margin-left: auto; }
      .dot { font-size: 10px; }
      .dot.working { color: var(--green); } .dot.waiting { color: var(--yellow); }
      .dot.idle { color: var(--gray); } .dot.offline { color: var(--red); }
      section { display: flex; flex-direction: column; min-height: 0; }
      .feed-head { padding: 10px 16px; border-bottom: 1px solid var(--line); font-weight: 700; }
      .feed-head .sub { color: var(--dim); font-weight: 400; margin-left: 8px; font-size: 12px; }
      .feed { overflow-y: auto; padding: 8px 16px; flex: 1; }
      .msg { padding: 3px 0; white-space: pre-wrap; word-break: break-word; }
      .msg .ts { color: var(--gray); }
      .msg .who { font-weight: 700; }
      .msg .badge { font-size: 10px; padding: 0 5px; border-radius: 3px; margin: 0 4px;
        background: #ffffff14; color: var(--dim); }
      .msg .badge.chat { color: var(--accent); } .msg .badge.unicast { color: var(--yellow); }
      .msg .badge.anycast { color: var(--green); }
      .empty { color: var(--dim); padding: 24px 16px; }
    </style>
  </head>
  <body>
    <header>
      <span class="title">Swarl</span>
      <span class="space" id="space"></span>
      <span class="conn down" id="conn">connecting</span>
    </header>
    <main>
      <aside>
        <div class="group-title">Online</div>
        <div id="roster"></div>
        <div class="group-title">Channels</div>
        <div id="channels"></div>
      </aside>
      <section>
        <div class="feed-head" id="feed-head">All activity<span class="sub" id="feed-sub"></span></div>
        <div class="feed" id="feed"></div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
