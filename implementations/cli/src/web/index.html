<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swarl · observability</title>
    <style>
      :root {
        --bg: #0b0e14; --panel: #0e131b; --panel2: #131a24; --line: #1c2330;
        --fg: #c9d1d9; --dim: #8b949e; --faint: #6e7681;
        --accent: #58a6ff; --green: #3fb950; --yellow: #d8a626; --amber: #e3973a;
        --red: #f85149; --purple: #bc8cff; --sel: #1f6feb22;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr;
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        background: var(--bg); color: var(--fg);
      }

      /* ── Header: brand + space + live, and the golden-signal tiles on the right ── */
      header {
        display: flex; align-items: center; gap: 10px; padding: 8px 14px;
        border-bottom: 1px solid var(--line); background: var(--panel);
      }
      header .brand { display: flex; align-items: center; gap: 7px; }
      header .brand .glyph { color: var(--accent); font-size: 11px; }
      header .title { font-weight: 700; font-size: 15px; letter-spacing: .02em; }
      header .space { color: var(--dim); font-size: 12px; }
      header .conn {
        font-size: 11px; padding: 1px 9px; border-radius: 10px;
        border: 1px solid var(--line); color: var(--dim);
      }
      header .conn.live { color: var(--green); border-color: #3fb95055; background: #3fb95014; }
      header .conn.down { color: var(--red); border-color: #f8514955; }
      header .conn::before { content: "● "; }
      .tiles { margin-left: auto; display: flex; gap: 6px; }
      .tile {
        display: flex; flex-direction: column; line-height: 1.15; min-width: 56px;
        padding: 4px 10px; border: 1px solid var(--line); border-left: 3px solid var(--faint);
        border-radius: 6px; background: var(--panel2);
      }
      .tile .n { font-weight: 700; font-size: 16px; }
      .tile .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); }
      .tile.working { border-left-color: var(--green); } .tile.working .n { color: var(--green); }
      .tile.idle { border-left-color: var(--faint); } .tile.idle .n { color: var(--dim); }
      .tile.offline { border-left-color: var(--red); } .tile.offline .n { color: var(--red); }
      .tile.waiting { border-left-color: var(--yellow); } .tile.waiting .n { color: var(--yellow); }
      .tile.waiting.hot { border-color: var(--yellow); }

      main { display: grid; grid-template-columns: 248px 1fr 264px; min-height: 0; }
      aside { overflow-y: auto; background: var(--panel); border-right: 1px solid var(--line); }
      aside.rail { border-right: 0; border-left: 1px solid var(--line); }
      .ghead {
        display: flex; align-items: center; gap: 8px; padding: 12px 14px 5px;
        font-size: 11px; letter-spacing: .09em; text-transform: uppercase; color: var(--dim);
      }
      .ghead .c { margin-left: auto; color: var(--faint); }
      .ghead .badge-n {
        margin-left: auto; min-width: 18px; text-align: center; font-size: 11px;
        padding: 0 5px; border-radius: 9px; background: var(--red); color: #0b0e14; font-weight: 700;
      }

      /* ── Roster ── */
      .peer {
        display: flex; gap: 8px; padding: 6px 14px; align-items: flex-start;
        border-left: 2px solid transparent;
      }
      .peer.waiting { border-left-color: var(--yellow); background: #d8a6260f; }
      .peer .dot { font-size: 11px; width: 12px; text-align: center; flex: none; margin-top: 1px; }
      .dot.working { color: var(--green); } .dot.waiting { color: var(--yellow); }
      .dot.idle { color: var(--faint); } .dot.offline { color: var(--red); }
      .peer .meta { min-width: 0; flex: 1; }
      .peer .l1 { display: flex; gap: 6px; align-items: baseline; min-width: 0; }
      .peer .name { color: var(--fg); font-weight: 600; white-space: nowrap; }
      .peer .role { color: var(--dim); font-size: 12px; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; }
      .tag {
        font-size: 10px; padding: 0 6px; border-radius: 4px; white-space: nowrap;
        background: #d8a62622; color: var(--yellow); border: 1px solid #d8a62655;
      }
      .peer .act { color: var(--dim); font-size: 12px; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; }

      /* ── Channels ── */
      .chan {
        display: flex; align-items: baseline; gap: 8px; padding: 5px 14px;
        cursor: pointer; border-left: 2px solid transparent;
      }
      .chan:hover { background: #ffffff08; }
      .chan.sel { background: var(--sel); border-left-color: var(--accent); }
      .chan .name { color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .chan .hash { color: var(--faint); }
      .chan .unread {
        margin-left: auto; min-width: 16px; text-align: center; font-size: 10px;
        padding: 0 5px; border-radius: 9px; background: var(--accent); color: #0b0e14; font-weight: 700;
      }
      .chan .count { color: var(--faint); font-size: 12px; }
      .chan .unread + .count { margin-left: 6px; }
      .chan .count:first-of-type { margin-left: auto; }

      /* ── Feed ── */
      section { display: flex; flex-direction: column; min-height: 0; }
      .feed-head {
        display: flex; align-items: center; gap: 8px; padding: 9px 16px;
        border-bottom: 1px solid var(--line);
      }
      .feed-head .h { font-weight: 700; }
      .feed-head .sub { color: var(--dim); font-weight: 400; font-size: 12px; }
      .feed-head .ctrls { margin-left: auto; display: flex; gap: 6px; align-items: center; }
      .chip {
        font-size: 11px; padding: 2px 9px; border-radius: 10px; cursor: pointer;
        border: 1px solid var(--line); background: var(--panel2); color: var(--faint);
        user-select: none;
      }
      .chip.on.chat { color: var(--accent); border-color: #58a6ff66; }
      .chip.on.unicast { color: var(--amber); border-color: #e3973a66; }
      .chip.on.anycast { color: var(--green); border-color: #3fb95066; }
      .chip.pause.on { color: var(--yellow); border-color: var(--yellow); }
      .feed { overflow-y: auto; padding: 6px 0; flex: 1; }
      .msg { padding: 5px 16px; }
      .msg.intent { background: #1f6feb14; border-left: 2px solid var(--accent); }
      .msg .top { display: flex; gap: 8px; align-items: baseline; }
      .msg .ts { color: var(--faint); flex: none; }
      .msg .who { font-weight: 700; }
      .msg .tgt { color: var(--dim); }
      .msg .body { padding-left: 64px; word-break: break-word; }
      .badge {
        font-size: 10px; padding: 0 6px; border-radius: 4px; flex: none;
        background: #ffffff10; color: var(--dim); text-transform: lowercase;
      }
      .badge.chat { color: var(--accent); background: #58a6ff1c; }
      .badge.unicast { color: var(--amber); background: #e3973a1c; }
      .badge.anycast { color: var(--green); background: #3fb9501c; }
      .divider { text-align: center; color: var(--faint); font-size: 11px; padding: 6px 0; }

      /* ── NEEDS YOU rail ── */
      .card {
        margin: 8px 12px; padding: 9px 11px; border: 1px solid var(--line);
        border-radius: 8px; background: var(--panel2); border-left: 3px solid var(--yellow);
      }
      .card .ch { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
      .card .cat { font-size: 10px; font-weight: 700; letter-spacing: .07em; color: var(--yellow); }
      .card .cat::before { content: "● "; }
      .card .when { margin-left: auto; font-size: 10px; color: var(--faint); }
      .card .title { font-weight: 700; }
      .card .desc { color: var(--dim); font-size: 12px; margin-top: 2px; }
      .rail-foot { padding: 10px 14px; color: var(--faint); font-size: 11px; }
      .empty { color: var(--faint); padding: 22px 16px; font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <span class="brand"><span class="glyph">◉</span><span class="title">Swarl</span></span>
      <span class="space" id="space"></span>
      <span class="conn down" id="conn">connecting</span>
      <div class="tiles" id="tiles"></div>
    </header>
    <main>
      <aside>
        <div class="ghead">Online <span class="c" id="online-c"></span></div>
        <div id="roster"></div>
        <div class="ghead">Channels</div>
        <div id="channels"></div>
      </aside>
      <section>
        <div class="feed-head">
          <span class="h" id="feed-title">All activity</span>
          <span class="sub" id="feed-sub"></span>
          <span class="ctrls" id="ctrls">
            <span class="chip chat on" data-mode="chat">chat</span>
            <span class="chip unicast on" data-mode="unicast">unicast</span>
            <span class="chip anycast on" data-mode="anycast">anycast</span>
            <span class="chip pause" id="pause">pause</span>
          </span>
        </div>
        <div class="feed" id="feed"></div>
      </section>
      <aside class="rail">
        <div class="ghead">Needs you <span class="badge-n" id="attn-n" style="display:none"></span></div>
        <div id="attention"></div>
      </aside>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
